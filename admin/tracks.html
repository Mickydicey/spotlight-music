<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks — Admin</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">
            <span class="logo-mark"></span>
            <span class="logo-text">SpotLight<span class="logo-accent">.</span></span>
            <span class="admin-badge">ADMIN</span>
        </div>
        <nav class="admin-nav">
            <a href="index.html" class="admin-nav-link">Dashboard</a>
            <a href="articles.html" class="admin-nav-link">Articles</a>
            <a href="artists.html" class="admin-nav-link">Artists</a>
            <a href="tracks.html" class="admin-nav-link active">Tracks</a>
        </nav>
        <div class="admin-sidebar-footer">
            <div class="admin-user-info">
                <div class="admin-user-avatar">A</div>
                <div>
                    <span class="admin-user-name">Admin</span>
                    <span class="admin-user-email" id="adminEmail">Loading...</span>
                </div>
            </div>
            <button class="admin-logout-btn" onclick="logout()">Log Out</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <div>
                <h1 class="admin-page-title">Tracks</h1>
                <p class="admin-page-sub">Manage your music library</p>
            </div>
            <div class="admin-header-actions">
                <button class="admin-btn admin-btn-primary" onclick="openTrackModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                    Add Track
                </button>
            </div>
        </header>

        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Track</th>
                        <th>Artist</th>
                        <th>Genre</th>
                        <th>Duration</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tracksTable">
                    <tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-3);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Track Modal -->
    <div class="admin-modal" id="trackModal" style="display:none;">
        <div class="admin-modal-content">
            <div class="admin-modal-header">
                <h2 id="trackModalTitle">Add New Track</h2>
                <button class="admin-modal-close" onclick="closeTrackModal()">&times;</button>
            </div>
            <form id="trackForm" class="admin-form-large">
                <input type="hidden" id="trackId">

                <div class="admin-form-group">
                    <label>Track Title *</label>
                    <input type="text" id="trackTitle" required placeholder="e.g. Adanna Rising">
                </div>

                <div class="admin-form-row">
                    <div class="admin-form-group">
                        <label>Artist *</label>
                        <select id="trackArtist" required>
                            <option value="">Choose artist</option>
                        </select>
                    </div>
                    <div class="admin-form-group">
                        <label>Genre *</label>
                        <select id="trackGenre" required>
                            <option value="">Choose genre</option>
                            <option value="Afrobeats">Afrobeats</option>
                            <option value="Amapiano">Amapiano</option>
                            <option value="Alté">Alté</option>
                            <option value="Hip-Hop">Hip-Hop</option>
                            <option value="R&B">R&B</option>
                            <option value="Highlife">Highlife</option>
                            <option value="Gospel">Gospel</option>
                            <option value="Fuji">Fuji</option>
                        </select>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label>Audio URL *</label>
                    <input type="url" id="trackAudioUrl" required placeholder="https://example.com/song.mp3">
                    <p class="admin-label-hint">For now, use a direct MP3 URL. File uploads coming next!</p>
                </div>

                <div class="admin-form-group">
                    <label>Duration</label>
                    <input type="text" id="trackDuration" placeholder="3:24">
                </div>

                <div class="admin-form-group">
                    <label>Cover Color</label>
                    <div class="admin-color-picker" id="trackColorPicker">
                        <button type="button" class="admin-color-swatch active" data-color="linear-gradient(135deg, #6a1b9a, #2a0845)" style="background: linear-gradient(135deg, #6a1b9a, #2a0845);"></button>
                        <button type="button" class="admin-color-swatch" data-color="linear-gradient(135deg, #c026d3, #4a044e)" style="background: linear-gradient(135deg, #c026d3, #4a044e);"></button>
                        <button type="button" class="admin-color-swatch" data-color="linear-gradient(135deg, #dc2626, #450a0a)" style="background: linear-gradient(135deg, #dc2626, #450a0a);"></button>
                        <button type="button" class="admin-color-swatch" data-color="linear-gradient(135deg, #059669, #064e3b)" style="background: linear-gradient(135deg, #059669, #064e3b);"></button>
                        <button type="button" class="admin-color-swatch" data-color="linear-gradient(135deg, #ea580c, #7c2d12)" style="background: linear-gradient(135deg, #ea580c, #7c2d12);"></button>
                        <button type="button" class="admin-color-swatch" data-color="linear-gradient(135deg, #0891b2, #164e63)" style="background: linear-gradient(135deg, #0891b2, #164e63);"></button>
                    </div>
                </div>

                <div class="admin-form-group">
                    <label class="admin-checkbox-label">
                        <input type="checkbox" id="trackFeatured">
                        <span>Feature this track</span>
                    </label>
                </div>

                <div class="admin-form-actions">
                    <button type="button" class="admin-btn admin-btn-ghost" onclick="closeTrackModal()">Cancel</button>
                    <button type="submit" class="admin-btn admin-btn-primary" id="saveTrackBtn">Save Track</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
